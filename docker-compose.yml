services:
  auction-server:
    build:
      context: ./server
    container_name: auction-server
    ports:
      - "5000:5000"
    environment:
      SERVER_PORT: 5000
      AUCTION_DURATION_SECONDS: 30

  auction-client:
    build:
      context: ./client
    depends_on:
      - auction-server
    stdin_open: true
    tty: true
    environment:
      SERVER_HOST: auction-server
      SERVER_PORT: 5000
